name: Docker image builds
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  backup-db:
    permissions:
      packages: write
    uses: ./.github/workflows/docker-build.yml
    with:
      name: "bus-tracker-backup"
      username: "Better-Transit-Ottawa"
      folder: "./containers/backup-db"
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}